spring:
  datasource:
    jndi-name: java:jboss/datasources/BaqueanoDS
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

# Swagger UI deshabilitado en prod (queda solo en dev)
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

logging:
  level:
    root: INFO
    ar.com.baqueano: INFO
