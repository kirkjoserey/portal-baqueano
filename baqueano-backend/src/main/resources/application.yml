spring:
  application:
    name: baqueano
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jpa:
    hibernate:
      ddl-auto: validate          # el schema lo maneja Flyway exclusivamente
    properties:
      hibernate:
        format_sql: true          # dialect se autodetecta a partir del driver MySQL
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  servlet:
    context-path: /baqueano

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: never
  info:
    env:
      enabled: true

info:
  app:
    name: ${spring.application.name}
    description: Portal Baqueano - Sistema de Gestion

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

baqueano:
  security:
    jwt:
      # En produccion exportar JWT_SECRET con minimo 256 bits aleatorios.
      # El default es solo para que la app levante en dev/test sin configuracion.
      secret: ${JWT_SECRET:cambiar-en-produccion-minimo-256-bits-de-entropia-aleatoria-aleatoria}
      expiration-ms: 1800000           # 30 minutos
      refresh-expiration-ms: 86400000  # 24 horas
