# Configuracion para tests @DataJpaTest contra MySQL local (BD baqueano_test).
# Activar con @ActiveProfiles("test") + @AutoConfigureTestDatabase(replace = NONE).
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/baqueano_test?useSSL=false&serverTimezone=America/Argentina/Buenos_Aires&characterEncoding=utf8
    username: baqueano
    password: baqueano
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

logging:
  level:
    ar.com.baqueano: INFO
    org.hibernate.SQL: WARN
